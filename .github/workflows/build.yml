name: Build and Release APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: mercury-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > ${{ runner.temp }}/release.keystore
            echo "KEYSTORE_PATH=${{ runner.temp }}/release.keystore" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          fi

      - name: Build Release APK
        if: env.KEYSTORE_PATH != ''
        run: ./gradlew assembleRelease

      - name: Verify APK certificate
        if: env.KEYSTORE_PATH != ''
        run: |
          jarsigner -verify -verbose -certs app/build/outputs/apk/release/app-release.apk | head -n 20

      - name: Upload Release APK
        if: env.KEYSTORE_PATH != ''
        uses: actions/upload-artifact@v4
        with:
          name: mercury-release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Rename APKs for release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/*.apk release/Mercury-Dev-${GITHUB_REF_NAME}.apk
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/*.apk release/Mercury-${GITHUB_REF_NAME}.apk
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
